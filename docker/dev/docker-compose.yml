services:
  dashboard:
    build:
      context: ../../
      dockerfile: Dockerfile
    image: sft-dataforge-dev:latest
    container_name: sft-dataforge-dev
    restart: always
    env_file:
      - .env.dev
    ports:
      - "8501:8501"
    environment:
      - ENV=dev
    volumes:
      - ../../logs:/app/logs
      - ../../nfs:/app/nfs
      - ../../config:/app/config
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    shm_size: '2gb'
    networks:
      - sft_dataforge_network

networks:
  sft_dataforge_network:
    driver: bridge
